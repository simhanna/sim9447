<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day3 캐릭터 | 긍정 배터리</title>
  <style>
    :root { --pink:#ffe3ef; --blue:#e3f1ff; --purple:#efe5ff; --ink:#4f4960; --shadow:0 18px 40px rgba(111,91,145,.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); font-family:"Pretendard","Noto Sans KR",Arial,sans-serif; background:linear-gradient(135deg,var(--pink),var(--blue) 48%,var(--purple)); }
    img { display:block; max-width:100%; }
    .wrap { width:min(1120px,92%); margin:0 auto; padding:34px 0 70px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:28px; }
    .home-btn { text-decoration:none; font-weight:900; padding:12px 18px; border-radius:999px; background:rgba(255,255,255,.8); box-shadow:var(--shadow); }
    h1 { margin:0; font-size:clamp(1.8rem,4vw,3rem); }
    .panel { padding:clamp(22px,4vw,42px); border-radius:30px; background:rgba(255,255,255,.8); box-shadow:var(--shadow); }
    .gallery { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; }
    .item { border:0; padding:0; border-radius:22px; overflow:hidden; background:#fff; cursor:pointer; box-shadow:0 12px 26px rgba(91,75,122,.12); transition:.25s ease; }
    .item:hover { transform:translateY(-5px); }
    .item img { width:100%; aspect-ratio:4/3; object-fit:cover; background:linear-gradient(135deg,var(--pink),var(--blue)); }
    .caption { padding:12px; font-size:.9rem; font-weight:800; text-align:center; word-break:break-all; }
    .lightbox { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(38,31,52,.78); z-index:999; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:min(94vw,1100px); max-height:88vh; border-radius:24px; box-shadow:0 24px 70px rgba(0,0,0,.35); }
    .lightbox-close { position:fixed; top:18px; right:18px; width:48px; height:48px; border:0; border-radius:50%; background:#fff; color:#5f536f; font-size:28px; font-weight:900; cursor:pointer; box-shadow:0 12px 28px rgba(0,0,0,.24); z-index:1000; }
    body.modal-open { overflow:hidden; }
    @media (max-width:900px) { .gallery { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:680px) { .topbar { align-items:flex-start; flex-direction:column; } .gallery { grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; } .panel { border-radius:24px; } }
  
    body{background:linear-gradient(135deg,#ffe8f2 0%,#f8e7f6 48%,#eee5ff 100%)!important;background-attachment:fixed!important;}
</style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="home-btn" href="../home.html">← 홈으로</a>
      <h1>Day3 캐릭터</h1>
    </div>
    <section class="panel">
      <div class="gallery">
        <button class="item" type="button" data-src="day3_sheet.png"><img src="day3_sheet.png" alt="day3_sheet.png"><div class="caption">day3_sheet.png</div></button>
        <button class="item" type="button" data-src="day3_world.png"><img src="day3_world.png" alt="day3_world.png"><div class="caption">day3_world.png</div></button>
        <button class="item" type="button" data-src="day3_emotions.png"><img src="day3_emotions.png" alt="day3_emotions.png"><div class="caption">day3_emotions.png</div></button>
        <button class="item" type="button" data-src="day3_story.png"><img src="day3_story.png" alt="day3_story.png"><div class="caption">day3_story.png</div></button>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="이미지 크게 보기">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="닫기">×</button>
    <img id="lightboxImage" src="" alt="확대 이미지" />
  </div>

  <script>
    const pageKey = 'scroll:' + location.pathname;
    const savedScroll = sessionStorage.getItem(pageKey);
    if (savedScroll !== null) requestAnimationFrame(() => scrollTo(0, Number(savedScroll)));
    addEventListener('pagehide', () => sessionStorage.setItem(pageKey, String(scrollY)));

    document.querySelectorAll('.item img').forEach(img => {
      img.addEventListener('error', () => {
        img.alt = '이미지 파일을 찾을 수 없습니다: ' + img.getAttribute('src');
        img.style.objectFit = 'contain';
        img.style.padding = '24px';
        img.style.background = 'linear-gradient(135deg, #ffe3ef, #e3f1ff, #efe5ff)';
      });
    });

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');
    let lightboxOpen = false;

    function openLightbox(src, alt) {
      sessionStorage.setItem(pageKey, String(scrollY));
      lightboxImage.src = src;
      lightboxImage.alt = alt || '확대 이미지';
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
      lightboxOpen = true;
      history.pushState({lightbox:true}, '', location.href);
      lightboxClose.focus();
    }

    function closeLightbox(fromHistory = false) {
      if (!lightboxOpen) return;
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
      lightboxImage.src = '';
      lightboxOpen = false;
      if (!fromHistory && history.state && history.state.lightbox) history.back();
      requestAnimationFrame(() => scrollTo(0, Number(sessionStorage.getItem(pageKey) || 0)));
    }

    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        openLightbox(item.dataset.src, img ? img.alt : '확대 이미지');
      });
    });

    lightboxClose.addEventListener('click', () => closeLightbox());
    lightbox.addEventListener('click', event => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeLightbox();
    });
    addEventListener('popstate', () => {
      if (lightboxOpen) closeLightbox(true);
    });
  </script>
</body>
</html>
