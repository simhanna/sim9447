<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>레트로 폭탄 대작전</title>
<style>
/* ===== 화면·CRT 스타일 ===== */
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020703;color:#d7ff71;font-family:"Courier New",monospace;overflow:hidden;touch-action:none}
body{display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,#16311c 0,#061108 45%,#010301 100%)}
.cabinet{position:relative;width:min(100vw,980px);height:100dvh;max-height:900px;display:flex;flex-direction:column;padding:clamp(8px,2vw,20px);filter:drop-shadow(0 0 24px #43ff5230)}
.brand{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:8px;text-shadow:3px 3px #143d18}
.brand h1{margin:0;color:#fff36b;font-size:clamp(18px,4vw,34px);letter-spacing:2px}.brand small{color:#66ff89;font-weight:bold;font-size:clamp(9px,1.6vw,13px)}
.screen{position:relative;flex:1;min-height:0;border:5px solid #31543a;outline:3px solid #101c12;background:#061008;border-radius:12px;overflow:hidden;box-shadow:inset 0 0 45px #000,0 0 0 2px #66ff8940}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated;background:#08150b}
.screen:after{content:"";pointer-events:none;position:absolute;inset:0;background:repeating-linear-gradient(0deg,#0000 0 3px,#0005 4px),linear-gradient(90deg,#f002,#0f01,#00f2);mix-blend-mode:overlay;z-index:4}
.screen:before{content:"";pointer-events:none;position:absolute;inset:-20%;background:linear-gradient(transparent 48%,#baffc30b 50%,transparent 52%);animation:scan 6s linear infinite;z-index:5}@keyframes scan{to{transform:translateY(55%)}}
.hud{position:absolute;left:12px;right:12px;top:10px;display:flex;justify-content:space-between;gap:8px;z-index:3;pointer-events:none;font-weight:bold;font-size:clamp(11px,2vw,16px);text-shadow:2px 2px #000}.hud span{background:#061008dd;border:2px solid #3f7549;padding:5px 8px}.danger{color:#ff5c68!important}
.overlay{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;padding:18px;background:#020a05d9;text-align:center}.panel{width:min(560px,94%);border:4px double #6dff82;background:#07120a;padding:clamp(18px,5vw,38px);box-shadow:0 0 30px #4dff6940,inset 0 0 30px #000}.panel h2{margin:0 0 14px;color:#fff36b;font-size:clamp(25px,7vw,48px);line-height:1}.panel p{line-height:1.65;margin:8px 0;color:#b7eebe}.panel .legend{font-size:12px;color:#7fa986}.pixel-btn{font:700 16px "Courier New",monospace;color:#081007;background:#fff36b;border:0;border-bottom:5px solid #9d861b;padding:13px 24px;margin-top:12px;cursor:pointer;box-shadow:0 0 15px #fff36b55}.pixel-btn:active{transform:translateY(3px);border-bottom-width:2px}.hidden{display:none!important}
.controls{height:118px;display:flex;justify-content:space-between;align-items:center;padding:9px 3vw 0;gap:14px}.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,34px);gap:3px}.ctrl{border:2px solid #4d8056;border-bottom-width:5px;background:#122b17;color:#baffc4;font:bold 19px monospace;border-radius:5px;user-select:none;-webkit-user-select:none}.ctrl:active,.ctrl.on{background:#3b8c4a;transform:translateY(2px);border-bottom-width:3px}.up{grid-column:2}.left{grid-row:2;grid-column:1}.down{grid-row:2;grid-column:2}.right{grid-row:2;grid-column:3}.actions{display:flex;align-items:center;gap:12px}.bomb{width:78px;height:78px;border-radius:50%;background:#be3540;border-color:#ff6670;color:white;font-size:12px}.pause{width:46px;height:46px;font-size:14px}.tip{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:#67906d;white-space:nowrap}
@media(min-width:760px){.controls{height:88px}.dpad{grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,34px)}.bomb{width:64px;height:64px}.tip{bottom:9px}}
</style>
</head>
<body>
<main class="cabinet">
  <header class="brand"><h1>💣 BOMB ESCAPE</h1><small>NEON CITY · 19XX</small></header>
  <section class="screen">
    <canvas id="game" width="800" height="560" aria-label="폭탄 피하기 게임"></canvas>
    <div class="hud"><span id="score">SCORE 00000</span><span id="level">LEVEL 1</span><span id="time">TIME 60</span><span id="hp">HP ♥♥♥</span></div>
    <div class="overlay" id="intro"><div class="panel"><h2>BOMB<br>ESCAPE</h2><p>폭탄병의 공격을 피하고<br>아이템을 모아 최고 점수에 도전하세요!</p><p class="legend">이동: 방향키 / WASD · 대시: SPACE<br>모바일: 아래 터치 버튼 · P: 일시정지</p><button class="pixel-btn" id="start">▶ GAME START</button></div></div>
    <div class="overlay hidden" id="result"><div class="panel"><h2 id="resultTitle">GAME OVER</h2><p id="resultText"></p><button class="pixel-btn" id="restart">↻ RETRY</button></div></div>
    <div class="overlay hidden" id="paused"><div class="panel"><h2>PAUSED</h2><p>잠시 숨을 고르세요.</p><button class="pixel-btn" id="resume">▶ CONTINUE</button></div></div>
  </section>
  <section class="controls" aria-label="모바일 게임 조작"><div class="dpad"><button class="ctrl up" data-key="ArrowUp">▲</button><button class="ctrl left" data-key="ArrowLeft">◀</button><button class="ctrl down" data-key="ArrowDown">▼</button><button class="ctrl right" data-key="ArrowRight">▶</button></div><div class="actions"><button class="ctrl pause" id="pauseBtn">Ⅱ</button><button class="ctrl bomb" id="dashBtn">DASH<br>⚡</button></div></section>
  <div class="tip">하트=회복 · 방패=무적 · 시계=시간 추가 · 별=점수</div>
</main>
<script>
/* ===== 레트로 폭탄 게임: 외부 파일 없이 동작합니다 ===== */
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=id=>document.getElementById(id),keys={},W=800,H=560;let state='intro',last=0,score=0,level=1,time=60,spawnTimer=0,itemTimer=0,shake=0,flash=0;
let player,enemies,bombs,blasts,items,particles;
const rnd=(a,b)=>Math.random()*(b-a)+a,clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* 플레이어·적·게임 데이터를 새로 준비합니다. */
function reset(){score=0;level=1;time=60;spawnTimer=0;itemTimer=4;player={x:W/2,y:H/2+80,r:13,hp:3,inv:0,shield:0,dash:0,dx:0,dy:0};enemies=[makeEnemy(90,95)];bombs=[];blasts=[];items=[];particles=[];updateHud()}
function makeEnemy(x=rnd(60,W-60),y=rnd(80,H-60)){return{x,y,r:15,speed:rnd(38,53),cool:rnd(.8,2.1),walk:0}}
function start(){reset();state='play';$('intro').classList.add('hidden');$('result').classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}

/* 키보드와 터치 버튼 입력 */
addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key.toLowerCase()==='p')togglePause();if(e.key===' ')doDash()});addEventListener('keyup',e=>keys[e.key]=false);
document.querySelectorAll('[data-key]').forEach(b=>{const on=e=>{e.preventDefault();keys[b.dataset.key]=true;b.classList.add('on')},off=e=>{e.preventDefault();keys[b.dataset.key]=false;b.classList.remove('on')};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off)});
$('dashBtn').onpointerdown=e=>{e.preventDefault();doDash()};$('pauseBtn').onclick=togglePause;$('start').onclick=start;$('restart').onclick=start;$('resume').onclick=togglePause;
function togglePause(){if(state==='play'){state='pause';$('paused').classList.remove('hidden')}else if(state==='pause'){state='play';$('paused').classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}}
function doDash(){if(state==='play'&&player.dash<=0){player.dash=.2;player.inv=.35;burst(player.x,player.y,'#74ff8d',14)}}

/* 폭탄은 잠시 뒤 십자 모양으로 폭발합니다. */
function plantBomb(e){bombs.push({x:e.x,y:e.y,t:1.35,r:9});e.cool=rnd(Math.max(.6,1.45-level*.12),Math.max(1.1,2.4-level*.12))}
function explode(b){shake=8;flash=.1;burst(b.x,b.y,'#ffdd55',30);const dirs=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];for(const[dX,dY]of dirs)blasts.push({x:b.x+dX*34,y:b.y+dY*34,r:25,t:.32});score+=25}
function hurt(){if(player.inv>0||player.shield>0)return;player.hp--;player.inv=1.2;shake=12;burst(player.x,player.y,'#ff4f64',22);if(player.hp<=0)end(false)}

/* 아이템: 회복 하트, 보호막, 제한시간 추가, 보너스 점수 */
function spawnItem(){const types=['heart','shield','clock','star'],type=types[Math.floor(Math.random()*types.length)];items.push({x:rnd(40,W-40),y:rnd(85,H-35),type,r:12,t:10})}
function takeItem(it){if(it.type==='heart')player.hp=Math.min(3,player.hp+1);if(it.type==='shield')player.shield=6;if(it.type==='clock')time+=8;if(it.type==='star')score+=350;score+=100;burst(it.x,it.y,'#fff36b',18)}

function update(dt){
  time-=dt;if(time<=0){time=0;end(true);return}level=Math.min(3,1+Math.floor((60-time)/20));
  let x=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0),y=(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0);if(x||y){const n=Math.hypot(x,y);x/=n;y/=n;player.dx=x;player.dy=y}const speed=player.dash>0?410:175;player.x=clamp(player.x+x*speed*dt,22,W-22);player.y=clamp(player.y+y*speed*dt,65,H-22);player.inv=Math.max(0,player.inv-dt);player.shield=Math.max(0,player.shield-dt);player.dash=Math.max(0,player.dash-dt);
  /* 폭탄병은 플레이어를 쫓아오며 일정 간격으로 공격합니다. */
  enemies.forEach(e=>{let dx=player.x-e.x,dy=player.y-e.y,n=Math.hypot(dx,dy)||1;e.x+=dx/n*e.speed*dt;e.y+=dy/n*e.speed*dt;e.cool-=dt;e.walk+=dt*8;if(e.cool<=0)plantBomb(e);if(n<player.r+e.r)hurt()});
  spawnTimer+=dt;if(level>enemies.length&&spawnTimer>2){enemies.push(makeEnemy());spawnTimer=0}
  bombs.forEach(b=>b.t-=dt);bombs.filter(b=>b.t<=0).forEach(explode);bombs=bombs.filter(b=>b.t>0);
  blasts.forEach(b=>{b.t-=dt;if(Math.hypot(player.x-b.x,player.y-b.y)<player.r+b.r)hurt()});blasts=blasts.filter(b=>b.t>0);
  itemTimer-=dt;if(itemTimer<=0){spawnItem();itemTimer=rnd(5,8)}items.forEach(i=>i.t-=dt);items.forEach(i=>{if(Math.hypot(player.x-i.x,player.y-i.y)<player.r+i.r){takeItem(i);i.t=0}});items=items.filter(i=>i.t>0);
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=70*dt;p.t-=dt});particles=particles.filter(p=>p.t>0);shake=Math.max(0,shake-25*dt);flash=Math.max(0,flash-dt);score+=dt*10;updateHud();
}
function updateHud(){$('score').textContent='SCORE '+Math.floor(score).toString().padStart(5,'0');$('level').textContent='LEVEL '+level;$('time').textContent='TIME '+Math.ceil(time);$('time').classList.toggle('danger',time<10);$('hp').textContent='HP '+('♥'.repeat(player?.hp||3))+('♡'.repeat(3-(player?.hp||3)))}
function end(clear){state='end';$('resultTitle').textContent=clear?'MISSION CLEAR!':'GAME OVER';$('resultText').innerHTML=`최종 점수 <b>${Math.floor(score).toString().padStart(5,'0')}</b><br>도달 레벨 ${level}`;$('result').classList.remove('hidden')}

/* 작은 네모 조각으로 픽셀 폭발 효과를 만듭니다. */
function burst(x,y,color,n){for(let i=0;i<n;i++){let a=rnd(0,Math.PI*2),s=rnd(35,150);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:rnd(.3,.8),color})}}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h)}
function drawPerson(p,enemy=false){const blink=!enemy&&player.inv>0&&Math.floor(player.inv*12)%2;if(blink)return;ctx.save();ctx.translate(Math.round(p.x),Math.round(p.y));let leg=Math.sin((p.walk||performance.now()/90))*3;rect(-7,-17,14,12,enemy?'#c94450':'#45d8ff');rect(-5,-23,10,7,enemy?'#ffb197':'#ffc89c');rect(-8,-22,16,4,enemy?'#7d1724':'#2b355f');rect(-10,-14,3,10,enemy?'#f05059':'#67eaff');rect(7,-14,3,10,enemy?'#f05059':'#67eaff');rect(-6,-5,5,10+leg,enemy?'#721a25':'#3157c7');rect(1,-5,5,10-leg,enemy?'#721a25':'#3157c7');if(enemy){rect(6,-18,6,6,'#222');rect(9,-22,2,5,'#ffcf45')}if(!enemy&&player.shield>0){ctx.strokeStyle='#74ffea';ctx.lineWidth=3;ctx.strokeRect(-17,-28,34,39)}ctx.restore()}
function draw(){ctx.save();ctx.translate(rnd(-shake,shake),rnd(-shake,shake));rect(0,0,W,H,'#07130a');for(let x=0;x<W;x+=32)for(let y=55;y<H;y+=32){rect(x,y,30,30,(x/32+y/32)%2?'#102619':'#0d2015');rect(x+4,y+4,3,3,'#1c3823')}rect(0,48,W,5,'#345e3b');
  items.forEach(i=>{const icons={heart:'♥',shield:'◆',clock:'◷',star:'★'};ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.fillStyle=i.type==='heart'?'#ff5a6a':i.type==='shield'?'#62e8ff':'#fff36b';ctx.fillText(icons[i.type],i.x,i.y+8)});
  bombs.forEach(b=>{let s=b.t<.5&&Math.floor(b.t*14)%2?'#fff':'#17151d';rect(b.x-10,b.y-8,20,17,s);rect(b.x-6,b.y-12,12,5,'#292630');rect(b.x+4,b.y-16,3,7,'#ffcf45')});
  blasts.forEach(b=>{rect(b.x-22,b.y-22,44,44,'#ff5b31');rect(b.x-14,b.y-28,28,56,'#ffcf45');rect(b.x-28,b.y-14,56,28,'#ffcf45');rect(b.x-10,b.y-10,20,20,'#fff7b0')});enemies.forEach(e=>drawPerson(e,true));drawPerson(player);particles.forEach(p=>rect(p.x,p.y,4,4,p.color));ctx.restore();if(flash){ctx.fillStyle='#fff8';ctx.fillRect(0,0,W,H)}}
function loop(now){if(state!=='play')return;const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();if(state==='play')requestAnimationFrame(loop)}
reset();draw();
</script>
</body>
</html>
