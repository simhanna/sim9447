<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>긍정 배터리 | 입장하기</title>
  <style>
    :root {
      --pink:#ffe3ef;
      --pink-deep:#ff8fb3;
      --purple:#efe5ff;
      --ink:#51485f;
      --shadow:0 22px 55px rgba(117,78,112,.18);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      display:grid;
      place-items:center;
      overflow:hidden;
      color:var(--ink);
      font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;
      background: linear-gradient(135deg, #ffe8f2 0%, #f8e7f6 48%, #eee5ff 100%);
      background-attachment: fixed;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-10%;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.55), transparent 31%),
        radial-gradient(circle at 82% 12%, rgba(255,255,255,.30), transparent 28%);
      pointer-events:none;
    }
    .entry-card{
      position:relative;
      z-index:1;
      width:min(90%,560px);
      padding:clamp(38px,7vw,72px) clamp(26px,6vw,58px);
      text-align:center;
      border:1px solid rgba(255,255,255,.95);
      border-radius:36px;
      background:rgba(255,255,255,.84);
      backdrop-filter:blur(14px);
      box-shadow:var(--shadow);
      animation:rise .7s ease both;
    }
    .icon{
      width:100px;
      height:100px;
      margin:0 auto 24px;
      display:grid;
      place-items:center;
      border-radius:50%;
      font-size:52px;
      background:linear-gradient(145deg,#ffd4e4,#efe2ff);
      box-shadow:inset 0 0 0 8px rgba(255,255,255,.65),0 14px 28px rgba(255,143,179,.2);
      animation:float 2.8s ease-in-out infinite;
    }
    h1{
      margin:0;
      font-size:clamp(1.7rem,5vw,2.65rem);
      line-height:1.35;
      color:#ef6f9a;
    }
    p{
      margin:18px 0 30px;
      font-size:clamp(1rem,2.4vw,1.18rem);
      line-height:1.8;
    }
    .enter-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:210px;
      padding:15px 28px;
      border:0;
      border-radius:999px;
      color:#fff;
      text-decoration:none;
      font-size:1.08rem;
      font-weight:900;
      background:linear-gradient(135deg,#ff9fbd,#e69cff);
      box-shadow:0 13px 27px rgba(226,115,166,.28);
      transition:transform .22s ease,box-shadow .22s ease;
    }
    .enter-btn:hover,.enter-btn:focus-visible{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 18px 34px rgba(226,115,166,.34);
    }
    .small{margin-top:20px;font-size:.88rem;color:#8c7c96}
    @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="entry-card">
    <div class="icon" aria-hidden="true">💗</div>
    <h1>긍정 배터리의 홈페이지로<br>들어가시겠습니까?</h1>
    <p>즐거움과 열정, 감사의 마음을 담은<br>나의 포트폴리오를 소개합니다.</p>
    <a class="enter-btn" href="home.html">홈페이지 들어가기 ✨</a>
    <div class="small">버튼을 누르면 포트폴리오가 시작됩니다.</div>
  </main>
</body>
</html>
